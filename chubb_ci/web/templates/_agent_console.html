{# Shared agent run console: run list + live log + result + review queue.
   Auto-wired by the agent-console module in app.js. Pass `console_workflow`
   to filter the run list to one workflow. #}
<section id="agent-console" data-workflow="{{ console_workflow | default('') }}"
         class="grid grid-cols-1 lg:grid-cols-12 gap-gutter">
  <!-- Run list -->
  <div class="lg:col-span-4 bg-surface-container-lowest rounded-xl border border-outline-variant/30 shadow-[0px_2px_8px_rgba(18,58,99,0.05)] overflow-hidden">
    <div class="px-lg py-md border-b border-outline-variant/30 flex items-center justify-between">
      <h2 class="font-headline-md text-headline-md text-on-surface">运行记录</h2>
      <button onclick="loadRuns()" class="material-symbols-outlined text-on-surface-variant hover:text-primary" style="font-size:20px;" title="刷新">refresh</button>
    </div>
    <div id="run-list" class="divide-y divide-outline-variant/30 max-h-[480px] overflow-y-auto">
      <p class="px-lg py-md text-body-sm text-on-surface-variant">暂无运行记录。</p>
    </div>
  </div>

  <!-- Live log + result + review queue -->
  <div class="lg:col-span-8 space-y-gutter">
    <div class="bg-surface-container-lowest rounded-xl p-lg border border-outline-variant/30 shadow-[0px_2px_8px_rgba(18,58,99,0.05)]">
      <div class="flex items-center justify-between mb-md">
        <div class="flex items-center gap-sm">
          <span class="material-symbols-outlined text-secondary">terminal</span>
          <h2 class="font-headline-md text-headline-md text-on-surface">运行日志（实时）</h2>
        </div>
        <span id="run-status" class="px-2 py-0.5 rounded bg-surface-container text-on-surface-variant font-label-sm text-label-sm">未选择运行</span>
      </div>
      <div id="agent-log" class="bg-inverse-surface rounded-lg p-md font-body-sm text-body-sm leading-6 min-h-[180px] max-h-[360px] overflow-y-auto" style="font-family: ui-monospace,'Cascadia Mono',monospace;">
        <div class="text-inverse-on-surface/50">启动一个工作流后，这里将实时显示智能体的每一步操作。</div>
      </div>
      <div id="run-meta" class="mt-sm font-body-sm text-body-sm text-on-surface-variant"></div>
    </div>

    <div id="result-card" class="hidden bg-surface-container-lowest rounded-xl p-lg border border-outline-variant/30 shadow-[0px_2px_8px_rgba(18,58,99,0.05)]">
      <h2 class="font-headline-md text-headline-md text-on-surface mb-md">运行结果</h2>
      <div id="agent-result" class="prose-report text-on-surface-variant max-h-[520px] overflow-y-auto"></div>
    </div>

    <div id="facts-card" class="hidden bg-surface-container-lowest rounded-xl border border-outline-variant/30 shadow-[0px_2px_8px_rgba(18,58,99,0.05)] overflow-hidden">
      <div class="px-lg py-md border-b border-outline-variant/30 flex items-center gap-sm">
        <span class="material-symbols-outlined text-tertiary-fixed-dim" style="font-variation-settings:'FILL' 1;">how_to_reg</span>
        <h2 class="font-headline-md text-headline-md text-on-surface">信息确认队列（真实性核查）</h2>
      </div>
      <div id="facts-list" class="divide-y divide-outline-variant/30 max-h-[420px] overflow-y-auto"></div>
    </div>
  </div>
</section>
