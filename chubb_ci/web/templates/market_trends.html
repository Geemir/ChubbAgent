{% extends "base.html" %}
{% block title %}市场趋势{% endblock %}
{% block content %}

<div>
  <h1 class="font-display-lg text-display-lg text-on-surface">市场趋势</h1>
  <p class="text-body-lg text-on-surface-variant mt-sm">近 30 天竞争态势分析（共 {{ trends.total_events }} 项变化）。</p>
</div>

<section class="grid grid-cols-1 lg:grid-cols-12 gap-gutter">
  <!-- Price direction over time -->
  <div class="lg:col-span-8 bg-surface-container-lowest rounded-xl p-lg border border-outline-variant/30 shadow-[0px_2px_8px_rgba(18,58,99,0.05)] flex flex-col">
    <h2 class="font-headline-md text-headline-md text-on-surface mb-md">每日价格调整（涨价 / 降价）</h2>
    <div class="flex-1 min-h-[300px]"><canvas id="priceDirChart"></canvas></div>
  </div>
  <!-- Event types -->
  <div class="lg:col-span-4 bg-surface-container-lowest rounded-xl p-lg border border-outline-variant/30 shadow-[0px_2px_8px_rgba(18,58,99,0.05)] flex flex-col">
    <h2 class="font-headline-md text-headline-md text-on-surface mb-md">变化类型分布</h2>
    <div class="flex-1 min-h-[300px] flex items-center justify-center"><canvas id="eventTypeChart"></canvas></div>
  </div>
</section>

<section class="grid grid-cols-1 lg:grid-cols-12 gap-gutter">
  <!-- Competitor activity -->
  <div class="lg:col-span-7 bg-surface-container-lowest rounded-xl p-lg border border-outline-variant/30 shadow-[0px_2px_8px_rgba(18,58,99,0.05)] flex flex-col">
    <h2 class="font-headline-md text-headline-md text-on-surface mb-md">各竞争对手活跃度</h2>
    <div class="flex-1 min-h-[300px]"><canvas id="competitorChart"></canvas></div>
  </div>
  <!-- Category distribution -->
  <div class="lg:col-span-5 bg-surface-container-lowest rounded-xl p-lg border border-outline-variant/30 shadow-[0px_2px_8px_rgba(18,58,99,0.05)] flex flex-col">
    <h2 class="font-headline-md text-headline-md text-on-surface mb-md">在监产品品类分布</h2>
    <div class="flex-1 min-h-[300px] flex items-center justify-center"><canvas id="categoryChart"></canvas></div>
  </div>
</section>

{% endblock %}
{% block scripts %}
<script id="trends-data" type="application/json">{{ trends|tojson }}</script>
<script>
  window.__trends = JSON.parse(document.getElementById('trends-data').textContent);
  window.__initTrendsCharts && window.__initTrendsCharts();
</script>
{% endblock %}
