      - 腕表收藏生态（摇表器/展示）深度整合
    shortcomings:
      - 极窄受众
      - 国内渠道与售后有限
    price_architecture: []
    market_scale: 高奢细分品牌。
    supply_chain: 欧洲制造，跨境分销。
