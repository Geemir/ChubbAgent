  # --- 以下两个品牌来自竞品分析 PPTX（保险柜市场竞品分析V7），非 §6 档案 ---
  - name: 善卫 SentrySafe
    name_en: SentrySafe
    positioning: “防火专家”——美国防火保险箱专业品牌，主打 UL 防火 + ETL 防水认证。
    competition_tier: 防火细分市场竞争
    target_audience: 重视文件/数据防火防水保护的家庭与小型办公用户。
    strengths:
      - UL 防火 2 小时 + ETL 防水 24 小时双认证
      - 美国防火箱细分市场知名度高
    shortcomings:
      - 防盗等级与高端定制能力有限
      - 国内渠道与售后覆盖薄弱
    price_architecture:
      - series: STW 系列
        desc: UL防火2H + ETL防水24H
        price_range: 7300+ RMB
    market_scale: 美国防火箱专业品牌，国内以电商渠道为主。
    supply_chain: 美国品牌，跨境/电商渠道销售。
    warranty: 依赖电商渠道售后。

  - name: 盾牌 Dunpai
    name_en: Dunpai
    positioning: “防火王者”——国产防火防水箱专业品牌，防火防水箱电商销量领先。
    competition_tier: 防火细分市场竞争（国产）
    target_audience: 价格敏感、重防火防水的家庭用户与小微企业。
    strengths:
      - UL 防火 + SGS 防水认证组合，防火防水箱销量第一
      - 电商渠道运营能力强
    shortcomings:
      - 高端市场品牌力不足
      - 防盗认证与高安防产品线薄弱
    price_architecture:
      - series: 逸尚系列
        desc: UL 1h 防火 + SGS 8h 防水
        price_range: 1200+ RMB
      - series: 帝尚系列
        desc: UL 60min 防火 + CSP 防盗认证
        price_range: 560–22000+ RMB
    market_scale: 国产防火防水箱头部电商品牌。
    supply_chain: 国内生产，电商为主。
    warranty: 常规国内质保。

  - name: Buben & Zorweg
    name_en: Buben & Zorweg (B&Z)
    positioning: “高端创新/高奢设计”——前卫设计理念 + 奢华材质，面向顶级腕表藏家的心理与收藏需求。
    competition_tier: 高奢设计竞争（luxury design segment）
    target_audience: 顶级腕表收藏家与鉴赏家。
    strengths:
