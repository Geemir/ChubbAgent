    selectors: *suning_sel
    notes: 苏宁搜索「驰球保险柜」。苏宁在售国产品牌。

  - name: tiger-suning-search
    company: 虎牌 Tiger
    enabled: false
    fetcher: browser
    page_type: pricing
    channel: 苏宁
    frequency: daily
    urls:
      - https://search.suning.com/%E8%99%8E%E7%89%8C%E4%BF%9D%E9%99%A9%E6%9F%9C/
    selectors: *suning_sel
    notes: 苏宁搜索「虎牌保险柜」。苏宁在售品牌为「虎王」，虎牌存在性待确认后启用。

  # ============= 京东（需登录态）：先 `chubb-ci login jd` 再启用 =============
  # 京东搜索有手机验证墙；注入登录 cookie 后可用。选择器为京东搜索页标准结构。
  - name: yongfa-jd-search
    company: 永发 Yongfa
    enabled: true
    fetcher: browser
    page_type: pricing
    channel: 京东
    frequency: daily
    urls:
      - https://search.jd.com/Search?keyword=%E6%B0%B8%E5%8F%91%E4%BF%9D%E9%99%A9%E6%9F%9C&enc=utf-8
    enrich_details: true    # JD 商详页规格参数在 DOM 中，可补全 尺寸/重量/认证
    selectors: &jd_sel
      item: li.gl-item
      name: .p-name em
      price: .p-price
      image: .p-img img
      link: .p-name a
      sales: .p-commit strong
    notes: 京东搜索「永发保险柜」。需先 `chubb-ci login jd`（扫码）保存登录态后启用。

  - name: aipu-jd-search
    company: 艾谱 AIPU
    enabled: true
