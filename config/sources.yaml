    selectors: *suning_sel
    notes: 苏宁搜索「甬康达保险柜」。苏宁在售国产品牌，真实价格。

  - name: huwang-suning-search
    company: 虎王 Huwang
    enabled: true
    fetcher: browser
    page_type: pricing
    channel: 苏宁
    frequency: daily
    urls:
      - https://search.suning.com/%E8%99%8E%E7%8E%8B%E4%BF%9D%E9%99%A9%E6%9F%9C/
    selectors: *suning_sel
    notes: 苏宁搜索「虎王保险柜」。苏宁在售国产品牌。

  - name: chiqiu-suning-search
    company: 驰球 CIIQ
    enabled: true
    fetcher: browser
    page_type: pricing
    channel: 苏宁
    frequency: daily
    urls:
