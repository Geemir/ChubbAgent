    enrich_details: true
    selectors: *jd_sel
    notes: 京东搜索「甬康达保险柜」。与苏宁甬康达同型号可并排比价。需登录态。

  - name: huwang-jd-search
    company: 虎王 Huwang
    enabled: true
    fetcher: browser
