# =========================================================================
# Competitor monitoring sources.  Add a competitor = add a block here.
# NO code change required.  Loaded by chubb_ci/config/sources.py
#
# Fields per source:
#   name        unique id (stable; used to track a page over time)
#   company     competitor / brand display name
#   enabled     true/false
#   fetcher     static | browser | local
#                 static  = httpx (fast; brand 官网, static pages)
#                 browser = Playwright (JS / marketplace pages; needs `browser` extra)
#                 local   = read an HTML file from disk (demos / offline tests)
#   page_type   product | pricing | campaign | news
#   channel     官网 | 天猫 | 京东 | 拼多多 | 线下 | 其他
#   frequency   daily | weekly | manual   (scheduler runs daily/weekly cadences)
#   urls        one or more page URLs (or local file paths for fetcher=local)
#   selectors   OPTIONAL css hints passed to the extractor as guidance
#   notes       free text
#
# NOTE on the China market: brand 官网 are product-catalog / news sites and usually do
# NOT list prices — great for tracking product line-ups, new series and news. PRICES and
# PROMOTIONS live on the marketplaces (天猫 / 京东), which are JS-heavy + anti-bot, so those
# are configured as `browser` sources (best-effort) and disabled until Playwright is set up:
#   uv sync --extra browser && uv run playwright install chromium
# =========================================================================

version: 1

defaults:
  currency: CNY
  fetcher: static
  frequency: daily
  page_type: product

sources:
  # ======================= 官网 CATALOG SPIDER (full range) ==================
  # crawl_catalog=true → follow product-detail links from each listing/category page and
  # extract EVERY product (name + official image + specs from the detail spec table).
  # No price on 官网; goal is complete product coverage. selectors.product_href marks
  # detail links; selectors.image/name are optional card hints.
  #
  # 艾谱 AIPU — aipuindustrial.com (export site). Static, English spec tables
  # (Model/External size(mm)/N.W.(kgs)). Categories /products/1..23.html →
  # /products-info/N.html details. ~55 products, images under /uploads/images/.
  - name: aipu-catalog
    company: 艾谱 AIPU
    enabled: true
    fetcher: static
    page_type: product
    channel: 官网
    frequency: weekly
    crawl_catalog: true
    enrich_details: true
    selectors:
      product_href: 'products-info/\d+'
    urls:
      - https://aipuindustrial.com/products/1.html
      - https://aipuindustrial.com/products/2.html
      - https://aipuindustrial.com/products/3.html
      - https://aipuindustrial.com/products/4.html
      - https://aipuindustrial.com/products/5.html
      - https://aipuindustrial.com/products/6.html
      - https://aipuindustrial.com/products/7.html
      - https://aipuindustrial.com/products/8.html
      - https://aipuindustrial.com/products/9.html
      - https://aipuindustrial.com/products/10.html
      - https://aipuindustrial.com/products/11.html
      - https://aipuindustrial.com/products/12.html
      - https://aipuindustrial.com/products/13.html
      - https://aipuindustrial.com/products/14.html
      - https://aipuindustrial.com/products/15.html
      - https://aipuindustrial.com/products/16.html
      - https://aipuindustrial.com/products/17.html
      - https://aipuindustrial.com/products/18.html
      - https://aipuindustrial.com/products/19.html
      - https://aipuindustrial.com/products/20.html
      - https://aipuindustrial.com/products/21.html
      - https://aipuindustrial.com/products/22.html
      - https://aipuindustrial.com/products/23.html
    notes: 艾谱官网（出口站）全品类爬取。静态，英文规格表 → 尺寸/重量/型号；官网图片。约55款。

  # 福美德 Format — format-tresorbau.de. Static WordPress catalog; /produkte/ lists all
  # /produkt/produktserie-* series (67), each with a security grade (Grad N/0..VI).
  - name: format-catalog
    company: 福美德 Format
    enabled: true
    fetcher: static
    page_type: product
    channel: 官网
    frequency: weekly
    crawl_catalog: true
    enrich_details: true          # detail pages carry the product photo (listing has none)
    catalog_max_pages: 80
    selectors:
      product_href: '/produkt/'
    urls:
      - https://www.format-tresorbau.de/produkte/
    notes: 福美德官网全系列（LIBRA/LYRA/ORION/GEMINI/TOPAS/RUBIN/PEGASUS…，含安全等级）。静态；详情页取官网图。

  # 永发 Yongfa — 上海永发 yongfash.com（与集团站 yongfagroup 不同；此站产品可爬）。静态。
  # /pro/56_1..9.html 分页列表 → /pro/NNNNN.html 商品详情（5位ID）。列表已带名称+官网图。
  - name: yongfa-catalog
    company: 永发 Yongfa
    enabled: true
    fetcher: static
    page_type: product
    channel: 官网
    frequency: weekly
    crawl_catalog: true
    enrich_details: false
    selectors:
      product_href: '/pro/\d{4,}\.html'
    urls:
      - http://www.yongfash.com/pro/56_1.html
      - http://www.yongfash.com/pro/56_2.html
      - http://www.yongfash.com/pro/56_3.html
      - http://www.yongfash.com/pro/56_4.html
      - http://www.yongfash.com/pro/56_5.html
      - http://www.yongfash.com/pro/56_6.html
      - http://www.yongfash.com/pro/56_7.html
      - http://www.yongfash.com/pro/56_8.html
      - http://www.yongfash.com/pro/56_9.html
    notes: 上海永发官网保险箱分类（56，9页）。约74款，名称+官网图。

  # 迪堡 Diebold — dieboldsafe.com.cn. JS site; category productlist.php?ClassID=1..13 →
  # product_view.php?ProductID=* cards (names+images). Detail specs load via AJAX (not in
  # DOM) so enrich_details is off — we capture name + official image, best-effort.
  - name: diebold-catalog
    company: 迪堡 Diebold
    enabled: true
    fetcher: browser
    page_type: product
    channel: 官网
    frequency: weekly
    crawl_catalog: true
    enrich_details: false
    browser_wait_ms: 5000
    selectors:
      product_href: 'product_view\.php'
    urls:
      - http://www.dieboldsafe.com.cn/productlist.php?ClassID=1
      - http://www.dieboldsafe.com.cn/productlist.php?ClassID=2
      - http://www.dieboldsafe.com.cn/productlist.php?ClassID=3
      - http://www.dieboldsafe.com.cn/productlist.php?ClassID=4
      - http://www.dieboldsafe.com.cn/productlist.php?ClassID=5
      - http://www.dieboldsafe.com.cn/productlist.php?ClassID=6
      - http://www.dieboldsafe.com.cn/productlist.php?ClassID=7
      - http://www.dieboldsafe.com.cn/productlist.php?ClassID=8
      - http://www.dieboldsafe.com.cn/productlist.php?ClassID=9
      - http://www.dieboldsafe.com.cn/productlist.php?ClassID=10
      - http://www.dieboldsafe.com.cn/productlist.php?ClassID=11
      - http://www.dieboldsafe.com.cn/productlist.php?ClassID=12
      - http://www.dieboldsafe.com.cn/productlist.php?ClassID=13
    notes: 迪堡官网各品类（1-13）。JS 站，商详规格走 AJAX 不入 DOM → 仅取名称+官网图片，尽力而为。

  # ZOL 中关村在线「保险柜」聚合榜 — detail.zol.com.cn/strongbox/. 跨品牌型号+图片（得力/虎牌/
  # 艾谱/迪堡/欧奈斯…，名称即含品牌+型号）。JS 反爬「防刷验证」需 ~9s 才放行 → browser_wait_ms。
  # 多品牌来源，故 channel=ZOL、company 为聚合标签；型号由 model_code 从名称抽取。
  - name: zol-strongbox
    company: ZOL 聚合榜
    enabled: true
    fetcher: browser
    page_type: product
    channel: ZOL
    frequency: weekly
    crawl_catalog: true
    enrich_details: false
    browser_wait_ms: 9000
    selectors:
      product_href: 'strongbox/index\d+\.shtml'
    urls:
      - https://detail.zol.com.cn/strongbox/
    notes: ZOL 保险柜聚合榜首页（约49款，跨品牌型号+图片）。名称含品牌，model_code 自动抽取。

  # ============================ VERIFIED 官网 (live) ========================
  # 永发 Yongfa — Ningbo Yongfa Group, landmark CN safe brand. Static, UTF-8. Verified.
  - name: yongfa-products
    company: 永发 Yongfa
    enabled: false        # superseded by yongfa-catalog (yongfash.com); this JS hub only
    fetcher: static       # yielded ~16 empty series-names with no specs/images.
    page_type: product
    channel: 官网
    frequency: daily
    urls:
      - https://www.yongfagroup.com/products.html
    notes: （停用）集团站产品页为 JS 分类墙，仅出系列名。已由 yongfa-catalog（上海永发站）取代。

  - name: yongfa-news
    company: 永发 Yongfa
    enabled: true
    fetcher: static
    page_type: news
    channel: 官网
    frequency: weekly
    urls:
      - https://www.yongfagroup.com/news.html
    notes: 永发动态/工程案例（新品、活动、工程中标等信号）。

  # 迪堡 Diebold — 迪堡智能安防 (dieboldsafe.com.cn / 上海迪堡). Static, UTF-8. Verified.
  - name: diebold-products
    company: 迪堡 Diebold
    enabled: true
    fetcher: static
    page_type: product
    channel: 官网
    frequency: daily
    urls:
      - http://dieboldsafe.com.cn/
    notes: 智能保险柜/保管箱/摇表器保险柜/床头柜等高端系列。HTTP only（证书过期）；httpx 走 HTTP 正常。

  # ============== PPTX 重点品牌 官网 (verify URL, then enable) ===============
  - name: burgwachter-global
    company: 德国百卫特 Burg Wächter
    enabled: true
    fetcher: static
    page_type: product
    channel: 官网
    frequency: weekly
    urls:
      - https://www.burg.biz/
    notes: 重点关注竞品（PPTX 直接对标 Viper）。全球官网；中国渠道以京东/天猫为主，请核实后启用。

  - name: sentrysafe-official
    company: 善卫 SentrySafe
    enabled: true
    fetcher: static
    page_type: product
    channel: 官网
    frequency: weekly
    urls:
      - https://www.sentrysafe.com/
    notes: 美国官网（防火/防水箱产品线）。国内价格在电商渠道；请核实可达性后启用。

  - name: format-official
    company: 福美德 Format
    enabled: true
    fetcher: static
    page_type: product
    channel: 官网
    frequency: weekly
    urls:
      - https://www.format-tresorbau.de/
    notes: 德国官网（定制系列）。请核实后启用。

  # ==================== MARKETPLACE (prices) — via 苏宁 search ================
  # 实测结论（2026-07）：京东搜索/移动端已强制登录墙；苏宁搜索页可稳定渲染价格
  # （需 browser fetcher 的懒加载滚动）。抽取提示词只保留归属该品牌的商品。
  # Anti-bot is handled gracefully (status=blocked → logged & skipped).
  - name: deli-suning-search
    company: 得力 Deli
    enabled: true
    fetcher: browser
    page_type: pricing
    channel: 苏宁
    frequency: daily
    urls:
      - https://search.suning.com/%E5%BE%97%E5%8A%9B%E4%BF%9D%E9%99%A9%E6%9F%9C/
    # 苏宁瓦片选择器（实测）——供 tile 解析器提取 名称/价格/图片/链接
    selectors: &suning_sel
      item: .product-box
      price: .price-box
      image: img
      link: a
    notes: 苏宁搜索「得力保险柜」。实测瓦片解析出价格+图片+详情链接。

  - name: aipu-suning-search
    company: 艾谱 AIPU
    enabled: true
    fetcher: browser
    page_type: pricing
    channel: 苏宁
    frequency: daily
    urls:
      - https://search.suning.com/%E8%89%BE%E8%B0%B1%E4%BF%9D%E9%99%A9%E7%AE%B1/
    selectors: *suning_sel
    notes: 苏宁搜索「艾谱保险箱」。

