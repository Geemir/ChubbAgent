    enrich_details: true
    selectors: *jd_sel
    notes: 京东搜索「虎王保险柜」。与苏宁虎王同型号可并排比价。需登录态。

  - name: chiqiu-jd-search
    company: 驰球 CIIQ
    enabled: true
    fetcher: browser
    page_type: pricing
    channel: 京东
    frequency: daily
    urls:
      - https://search.jd.com/Search?keyword=%E9%A9%B0%E7%90%83%E4%BF%9D%E9%99%A9%E6%9F%9C&enc=utf-8
    enrich_details: true
    selectors: *jd_sel
    notes: 京东搜索「驰球保险柜」。与苏宁驰球同型号可并排比价。需登录态。

  # ============= 天猫（需登录态，反爬更强，尽力而为）======================
